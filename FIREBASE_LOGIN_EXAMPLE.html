<!-- FIREBASE AUTH EXAMPLE - Copy to your login.html -->
<!-- This shows how to add Firebase authentication to your login page -->

<div class="auth-container">
    <h2>Sign In</h2>
    <form id="loginForm" onsubmit="handleSignIn(event)">
        <input 
            type="email" 
            id="loginEmail" 
            placeholder="Email address" 
            required
        >
        <input 
            type="password" 
            id="loginPassword" 
            placeholder="Password" 
            required
        >
        <button type="submit">Sign In</button>
        <p id="loginError" style="color: red;"></p>
    </form>
    
    <p>Don't have an account? <a href="#signup" onclick="toggleSignUp()">Sign Up Here</a></p>
</div>

<div class="signup-container" id="signupContainer" style="display: none;">
    <h2>Create Account</h2>
    <form id="signupForm" onsubmit="handleSignUp(event)">
        <input 
            type="email" 
            id="signupEmail" 
            placeholder="Email address" 
            required
        >
        <input 
            type="password" 
            id="signupPassword" 
            placeholder="Password (min 6 characters)" 
            minlength="6"
            required
        >
        <input 
            type="password" 
            id="signupConfirm" 
            placeholder="Confirm password" 
            required
        >
        <button type="submit">Create Account</button>
        <p id="signupError" style="color: red;"></p>
    </form>
    
    <p><a href="#login" onclick="toggleSignUp()">Back to Sign In</a></p>
</div>

<!-- Add this at the end of your login.html body, after firebase-init.js -->
<script>
// Toggle between sign in and sign up forms
function toggleSignUp() {
    const loginContainer = document.querySelector('.auth-container');
    const signupContainer = document.getElementById('signupContainer');
    
    loginContainer.style.display = 
        loginContainer.style.display === 'none' ? 'block' : 'none';
    signupContainer.style.display = 
        signupContainer.style.display === 'none' ? 'block' : 'none';
}

// Handle Sign In
function handleSignIn(event) {
    event.preventDefault();
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.textContent = ''; // Clear previous errors
    
    // Sign in with Firebase
    firebase.auth().signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            console.log('User signed in:', userCredential.user.email);
            errorDiv.textContent = '';
            
            // Save user data to Firestore
            const db = firebase.firestore();
            const user = userCredential.user;
            
            db.collection('users').doc(user.uid).set({
                email: user.email,
                lastLogin: new Date(),
                displayName: user.displayName || email.split('@')[0]
            }, { merge: true }); // merge: true keeps existing data
            
            // Redirect to home page
            window.location.href = 'index.html';
        })
        .catch((error) => {
            console.error('Sign in error:', error.code, error.message);
            
            // Show user-friendly error messages
            let errorMessage = 'Sign in failed. ';
            if (error.code === 'auth/user-not-found') {
                errorMessage += 'Email not found.';
            } else if (error.code === 'auth/wrong-password') {
                errorMessage += 'Wrong password.';
            } else if (error.code === 'auth/invalid-email') {
                errorMessage += 'Invalid email address.';
            } else {
                errorMessage += error.message;
            }
            
            errorDiv.textContent = errorMessage;
        });
}

// Handle Sign Up
function handleSignUp(event) {
    event.preventDefault();
    
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    const errorDiv = document.getElementById('signupError');
    
    errorDiv.textContent = ''; // Clear previous errors
    
    // Validate passwords match
    if (password !== confirm) {
        errorDiv.textContent = 'Passwords do not match.';
        return;
    }
    
    // Create user with Firebase
    firebase.auth().createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
            console.log('Account created:', userCredential.user.email);
            
            const db = firebase.firestore();
            const user = userCredential.user;
            
            // Save user data to Firestore
            db.collection('users').doc(user.uid).set({
                email: user.email,
                createdAt: new Date(),
                displayName: email.split('@')[0],
                favoriteShows: [],
                watchHistory: [],
                watchlist: []
            });
            
            // Show success message
            errorDiv.style.color = 'green';
            errorDiv.textContent = 'Account created! Redirecting...';
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        })
        .catch((error) => {
            console.error('Sign up error:', error.code, error.message);
            
            let errorMessage = 'Sign up failed. ';
            if (error.code === 'auth/email-already-in-use') {
                errorMessage += 'Email already in use.';
            } else if (error.code === 'auth/weak-password') {
                errorMessage += 'Password is too weak (need at least 6 characters).';
            } else if (error.code === 'auth/invalid-email') {
                errorMessage += 'Invalid email address.';
            } else {
                errorMessage += error.message;
            }
            
            errorDiv.textContent = errorMessage;
        });
}

// Check if already logged in
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        console.log('User already logged in, redirecting...');
        window.location.href = 'index.html';
    }
});
</script>

}

#loginError,

    text-align: center;
    padding: 0.75rem;
    border-radius: 4px;
    background: rgba(255, 0, 0, 0.1);
}
</style>
